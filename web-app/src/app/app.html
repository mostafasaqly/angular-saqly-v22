<div class="app-layout">

  <!-- Mobile topbar -->
  <div class="topbar">
    <button
      class="hamburger"
      (click)="sidebarOpen.update(v => !v)"
      [attr.aria-label]="progress.isAr() ? 'فتح القائمة' : 'Open menu'"
    >☰</button>
    <span class="topbar-title">
      {{ progress.isAr() ? 'كورس أنجولار v22' : 'Angular v22 Course' }}
    </span>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div
    class="sidebar-overlay"
    [class.open]="sidebarOpen()"
    (click)="sidebarOpen.set(false)"
  ></div>

  <!-- Sidebar -->
  <app-sidebar
    [sections]="allSections"
    [activeId]="activeId()"
    [completed]="progress.completed()"
    [total]="allSections.length"
    [percent]="percent()"
    [isAr]="progress.isAr()"
    [theme]="progress.theme()"
    [open]="sidebarOpen()"
    (selectSection)="selectSection($event); sidebarOpen.set(false)"
    (toggleTheme)="progress.toggleTheme()"
    (toggleLang)="progress.toggleLang()"
  />

  <!-- Main -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>
